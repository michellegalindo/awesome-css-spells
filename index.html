<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome List Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Play:wght@700&display=swap">
    <link rel="stylesheet" href="app/assets/css/style.css">
    <style>
      :root { --font-display: 'Play', Georgia, serif; }
    </style>
  </head>

  <body>

  <!-- Sidebar -->
  <nav id="sidebar">
    <div id="sidebar-header">
      <img src="https://cdn.rawgit.com/sindresorhus/awesome/d7305f38d29fed78fa85652e3a63e154dd8e8829/media/badge.svg" alt="Awesome logo">
      <img src="https://github.com/user-attachments/assets/7c203134-debb-4343-9556-6620e884cbda" alt="CSS logo">
      <h1 id="list-title">— no list loaded —</h1>
    </div>
    <div id="toc"></div>
    <div id="stats">
      <span id="stat-links">0</span> links · <span id="stat-sections">0</span> sections
    </div>
  </nav>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div id="search-wrap">
        <input id="search" type="text" placeholder="Search links, descriptions…" autocomplete="off" disabled>
      </div>
      <div id="search-count"></div>
    </div>

    <div id="content">
      <div id="loading">loading README.md</div>
      <div id="error"><span class="big">⚠</span>Could not load <code>README.md</code>.<br>Make sure the file is in the same folder as this HTML.</div>

      <!-- Rendered markdown (hidden until loaded) -->
      <div id="rendered" class="hidden"></div>

      <!-- Search results (hidden until searching) -->
      <div id="results"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
  <script src="app/assets/js/test-mock.js"></script>
  <script src="app/assets/js/app.js"></script>

  </body>
</html>
